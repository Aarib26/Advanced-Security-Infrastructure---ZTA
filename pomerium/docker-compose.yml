services:
  pomerium:
    image: pomerium/pomerium:v0.32.3
    container_name: pomerium
    restart: unless-stopped
    network_mode: host
    environment:
      - SHARED_SECRET=${SHARED_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - IDP_CLIENT_SECRET=${POMERIUM_IDP_CLIENT_SECRET}
      - COOKIE_DOMAIN=${DOMAIN_NAME}
      - AUTHENTICATE_SERVICE_URL=https://${DOMAIN_NAME}
    volumes:
      - ./config.yaml:/pomerium/config.yaml:ro
      - /etc/caddy/certs/keycloak.crt:/pomerium/cert.pem:ro
      - /etc/caddy/certs/keycloak.key:/pomerium/key.pem:ro
    extra_hosts:
      - "${DOMAIN_NAME}:host-gateway"
      - "host.docker.internal:host-gateway"
    depends_on:
      - simple-app
      - admin-app

  simple-app:
    image: nginx:alpine
    container_name: simple-app
    volumes:
      - ./demo-app/html:/usr/share/nginx/html:ro
    networks:
      - pomerium-network

  admin-app:
    image: nginx:alpine
    container_name: admin-app
    ports:
      - "127.0.0.1:8082:80"
    networks:
      - pomerium-network

networks:
  pomerium-network:
    driver: bridge
  keycloak-network:
    external: true
    name: keycloak_keycloak-network

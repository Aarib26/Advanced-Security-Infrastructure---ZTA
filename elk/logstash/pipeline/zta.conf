input {
  beats { port => 5044 }
}
filter {
  if [fields][log_type] == "suricata" {
    json { source => "message" }
    date { match => ["timestamp", "ISO8601"] }
    mutate { add_tag => ["suricata", "ids"] }
    if [event_type] == "alert" {
      mutate { add_tag => ["security_alert"] }
    }
  }
  if [fields][log_type] == "zeek" {
    mutate { add_tag => ["zeek", "nta"] }
  }
  if [fields][log_type] == "zta-nac" {
    date { match => ["timestamp", "ISO8601"] }
    mutate { add_tag => ["nac", "device_onboard"] }
  }
  if [src_ip] {
    geoip { source => "src_ip" target => "geoip" }
  }
}
output {
  if "nac" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "zta-nac-%{+YYYY.MM.dd}"
    }
  }
  if "security_alert" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "zta-alerts-%{+YYYY.MM.dd}"
    }
  }
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "zta-logs-%{+YYYY.MM.dd}"
  }
}
